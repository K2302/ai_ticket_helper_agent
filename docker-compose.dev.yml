version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ai_human_loop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_human_loop"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data

  ai-triage:
    build:
      context: .
      dockerfile: services/ai-triage/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_human_loop
      OPENROUTER_API_KEY: ""
    ports:
      - "8000:8000"
    volumes:
      - ./services/ai-triage/app:/app/app:rw
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db_data:
